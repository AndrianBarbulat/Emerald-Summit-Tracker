<div class="modal auth-modal" id="auth-modal">
    <div class="modal-background" onclick="closeModal()"></div>
    <div class="modal-card auth-modal__card">
        <header class="modal-card-head auth-modal__head">
            <div>
                <p class="modal-card-title auth-modal__title" id="modal-title">Welcome Back</p>
                <p class="auth-modal__subtitle" id="modal-subtitle">Log in to keep tracking every summit.</p>
            </div>
            <button class="delete auth-modal__close" aria-label="close" onclick="closeModal()"></button>
        </header>
        <section class="modal-card-body auth-modal__body">
            <form action="/login" method="POST" novalidate data-auth-form="login">
                <div id="login-form">
                    <div class="field auth-modal__field">
                        <label class="label" for="login-email">Email</label>
                        <div class="control has-icons-left">
                            <input
                                class="input"
                                id="login-email"
                                type="email"
                                name="email"
                                placeholder="your@email.com"
                                required
                                data-auth-required
                                data-field-label="Email"
                            >
                            <span class="icon is-small is-left">
                                <i class="fas fa-envelope"></i>
                            </span>
                        </div>
                        <p class="help auth-modal__error" aria-live="polite"></p>
                    </div>

                    <div class="field auth-modal__field">
                        <label class="label" for="login-password">Password</label>
                        <div class="control has-icons-left">
                            <input
                                class="input"
                                id="login-password"
                                type="password"
                                name="password"
                                placeholder="********"
                                required
                                data-auth-required
                                data-field-label="Password"
                            >
                            <span class="icon is-small is-left">
                                <i class="fas fa-lock"></i>
                            </span>
                        </div>
                        <p class="help auth-modal__error" aria-live="polite"></p>
                    </div>

                    <div class="field mt-5">
                        <div class="control">
                            <button type="submit" class="button is-fullwidth auth-modal__submit auth-modal__submit--login">
                                Log In
                            </button>
                        </div>
                    </div>

                    <div class="has-text-centered mt-4 auth-modal__toggle-copy">
                        <p>New here? <a class="auth-modal__toggle-link" href="#" onclick="switchToSignup(); return false;">Create an account</a></p>
                    </div>
                </div>
            </form>

            <form action="/signup" method="POST" novalidate data-auth-form="signup">
                <div id="signup-form" style="display: none;">
                    <div class="field auth-modal__field">
                        <label class="label" for="signup-name">Full Name</label>
                        <div class="control has-icons-left">
                            <input
                                class="input"
                                id="signup-name"
                                type="text"
                                name="display_name"
                                placeholder="John Doe"
                                required
                                data-auth-required
                                data-field-label="Full name"
                            >
                            <span class="icon is-small is-left">
                                <i class="fas fa-user"></i>
                            </span>
                        </div>
                        <p class="help auth-modal__error" aria-live="polite"></p>
                    </div>

                    <div class="field auth-modal__field">
                        <label class="label" for="signup-email">Email</label>
                        <div class="control has-icons-left">
                            <input
                                class="input"
                                id="signup-email"
                                name="email"
                                type="email"
                                placeholder="your@email.com"
                                required
                                data-auth-required
                                data-field-label="Email"
                            >
                            <span class="icon is-small is-left">
                                <i class="fas fa-envelope"></i>
                            </span>
                        </div>
                        <p class="help auth-modal__error" aria-live="polite"></p>
                    </div>

                    <div class="field auth-modal__field">
                        <label class="label" for="signup-password">Password</label>
                        <div class="control has-icons-left">
                            <input
                                class="input"
                                id="signup-password"
                                type="password"
                                name="password"
                                placeholder="********"
                                required
                                data-auth-required
                                data-field-label="Password"
                            >
                            <span class="icon is-small is-left">
                                <i class="fas fa-lock"></i>
                            </span>
                        </div>
                        <p class="help auth-modal__error" aria-live="polite"></p>
                    </div>

                    <div class="field auth-modal__field">
                        <label class="label" for="signup-confirm-password">Confirm Password</label>
                        <div class="control has-icons-left">
                            <input
                                class="input"
                                id="signup-confirm-password"
                                type="password"
                                name="confirm_password"
                                placeholder="********"
                                required
                                data-auth-required
                                data-auth-confirm
                                data-field-label="Confirm password"
                            >
                            <span class="icon is-small is-left">
                                <i class="fas fa-lock"></i>
                            </span>
                        </div>
                        <p class="help auth-modal__error" aria-live="polite"></p>
                    </div>

                    <div class="field mt-5">
                        <div class="control">
                            <button type="submit" class="button is-fullwidth auth-modal__submit auth-modal__submit--signup">
                                Sign Up
                            </button>
                        </div>
                    </div>

                    <div class="has-text-centered mt-4 auth-modal__toggle-copy">
                        <p>Already have an account? <a class="auth-modal__toggle-link" href="#" onclick="switchToLogin(); return false;">Log in</a></p>
                    </div>
                </div>
            </form>
        </section>
    </div>
</div>
